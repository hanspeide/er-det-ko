<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nesKØya</title>
  <style>
body {
  font-family: sans-serif;
  height: 100vh;
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.status {
  font-size: 2em;
  margin-top: 20px;
}
.time {
  font-size: 1.2em;
  margin-top: 10px;
}
.updated,.note {
  margin-top: 30px;
  font-size: 0.9em;
  color: gray;
}
.coffee-button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
}
  </style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>

  <div class="status">Henter data...</div>
  <canvas id="elevationChart" width="600" height="200" style="margin-top: 40px;"></canvas>
  <div class="time"></div>
  <div class="updated"></div>
  <div class="note">Oppdateres hvert 2. minutt på ukedager fra kl. 07:00 til 10:00, ellers hvert 10. minutt</div>

  <script>
    async function loadTraffic() {
      const res = await fetch('/traffic.json');
      if (!res.ok) {
        document.querySelector('.status').textContent = "😭 Klarte ikke hente data.";
        return;
      }

      const data = await res.json();
      const statusEl = document.querySelector('.status');
      const timeEl = document.querySelector('.time');
      const updatedEl = document.querySelector('.updated');

      if (data.durationMinutes > data.staticMinutes + 2) {
        statusEl.textContent = "🤬 Kø!";
      } else {
        statusEl.textContent = "🏎️ Ingen kø";
      }

      timeEl.textContent = `${data.durationMinutes} minutter fra Kiwi til rundkjøringen`;
      updatedEl.textContent = `Sist oppdatert: ${data.updated}`;
    }

    loadTraffic();

    async function loadPathData() {
      const canvas = document.getElementById("elevationChart");
      const ctx = canvas.getContext("2d");
      
      const paddingTop = 20;
      const paddingX = 10; // pixels on both left and right
      const usableWidth = canvas.width - paddingX * 2;

      const res = await fetch('/pathData.json');
      if (!res.ok) return;

      const data = await res.json();

      const elevations = data.map(d => d.elevation);
      const minElevation = Math.min(...elevations);
      const maxElevation = Math.max(...elevations);

      const scaleX = usableWidth / (data.length - 1);
      const scaleY = (canvas.height - paddingTop) / (maxElevation - minElevation || 1);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw elevation line
      for (let i = 1; i < data.length; i++) {
        const prev = data[i - 1];
        const curr = data[i];

        const x1 = paddingX + (i - 1) * scaleX;
        const y1 = canvas.height - (prev.elevation - minElevation) * scaleY;
        const x2 = paddingX + i * scaleX;
        const y2 = canvas.height - (curr.elevation - minElevation) * scaleY;

        ctx.strokeStyle = curr.congested ? "red" : "green";
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      // Add markers for labels
      ctx.fillStyle = "black";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";

      data.forEach((point, i) => {
        if (point.label) {
          const x = paddingX + i * scaleX;
          const y = canvas.height - (point.elevation - minElevation) * scaleY;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, 2 * Math.PI);
          ctx.fill();

          ctx.fillText(point.label, x, y - 8);
        }
      });
    }

    loadPathData();
  </script>

</body>

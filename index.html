<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nesKØya</title>
  <style>
body {
  font-family: sans-serif;
  height: 100vh;
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.status {
  font-size: 2em;
  margin-top: 20px;
}
.time, .updated {
  font-size: 1.2em;
  margin-top: 10px;
}
.note {
  margin-top: 30px;
  font-size: 0.9em;
  color: gray;
}
  </style>
</head>
<body>

  <div class="status">Loading...</div>
  <div class="time"></div>
  <div class="updated"></div>
  <div class="note">Oppdateres hvert femte minutt på ukedager mellom 06:00 og 10:00.</div>

  <script>
    async function loadTraffic() {
      const res = await fetch('/er-det-ko/traffic.json');
      if (!res.ok) {
        document.querySelector('.status').textContent = "😭 Klarte ikke hente data.";
        return;
      }

      const data = await res.json();
      const statusEl = document.querySelector('.status');
      const timeEl = document.querySelector('.time');
      const updatedEl = document.querySelector('.updated');

      if (data.durationMinutes > data.staticMinutes + 2) {
        statusEl.textContent = "🤬 Kø!";
      } else {
        statusEl.textContent = "🎉 Ingen kø";
      }

      timeEl.textContent = `Det tar nå ${data.durationMinutes} å kjøre fra Kiwi til rundkjøringen`;
      updatedEl.textContent = `Sist oppdatert: ${data.updated}`;
    }

    loadTraffic();
  </script>

</body>
</html>

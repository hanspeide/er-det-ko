<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nesKØya</title>
  <style>
body {
  font-family: sans-serif;
  height: 100vh;
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.status {
  font-size: 2em;
  margin-top: 20px;
}
.time {
  font-size: 1.2em;
  margin-top: 10px;
}
.updated,.note {
  margin-top: 30px;
  font-size: 0.9em;
  color: gray;
}
.coffee-button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
}
  </style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>

  <div class="status">Henter data...</div>
  <div class="time"></div>
  <div class="updated"></div>
  <div class="note">Oppdateres hvert femte minutt på ukedager mellom 06:00 og 10:00.</div>

  <script>
    async function loadTraffic() {
      const res = await fetch('/traffic.json');
      if (!res.ok) {
        document.querySelector('.status').textContent = "😭 Klarte ikke hente data.";
        return;
      }

      const data = await res.json();
      const statusEl = document.querySelector('.status');
      const timeEl = document.querySelector('.time');
      const updatedEl = document.querySelector('.updated');

      if (data.durationMinutes > data.staticMinutes + 2) {
        statusEl.textContent = "🤬 Kø!";
      } else {
        statusEl.textContent = "🏎️ Ingen kø";
      }

      timeEl.textContent = `Det tar ${data.durationMinutes} minutter fra Kiwi til rundkjøringen`;
      updatedEl.textContent = `Sist oppdatert: ${data.updated}`;
    }

    loadTraffic();
  </script>

<a 
  href="https://www.buymeacoffee.com/hpeide" 
  target="_blank" 
  rel="noopener"
  class="coffee-button"
>
  <img 
    src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=hpeide&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff" 
    alt="Buy me a coffee"
  />
</a>
</body>
</html>

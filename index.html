<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nesKØya</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1"></script>
  <style>
    body {
      font-family: sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .status {
      font-size: 2em;
      margin-top: 20px;
    }

    .time {
      font-size: 1.2em;
      margin-top: 10px;
    }

    .updated,
    .note {
      margin-top: 30px;
      font-size: 0.9em;
      color: gray;
    }

    canvas {
      margin-top: 40px;
      width: 100%;
      max-width: 400px;
    }

    .coffee-button {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }
  </style>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>

  <div class="status">Henter data...</div>
  <div class="time"></div>
  <canvas id="elevationChart"></canvas>
  <div class="updated"></div>
  <div class="note">Oppdateres hvert 2. minutt på ukedager fra kl. 07:00 til 10:00, ellers hvert 10. minutt</div>

  <script>
    Chart.register(window['chartjs-plugin-annotation']);

    async function loadTraffic() {
      const res = await fetch('/traffic.json');
      if (!res.ok) {
        document.querySelector('.status').textContent = "😭 Klarte ikke hente data.";
        return;
      }

      const data = await res.json();
      document.querySelector('.status').textContent = data.durationMinutes > data.staticMinutes + 2
        ? "🤬 Kø!" : "🏎️ Ingen kø";
      document.querySelector('.time').textContent = `${data.durationMinutes} minutter fra Kiwi til rundkjøringen`;
      document.querySelector('.updated').textContent = `Sist oppdatert: ${data.updated}`;
    }

    async function loadPathData() {
      const res = await fetch('/pathData.json');
      if (!res.ok) return;

      const data = await res.json();
      const elevations = data.map(p => p.elevation);
      const segmentColors = data.map(p => p.congested ? 'rgba(255,0,0,1)' : 'rgba(0,128,0,1)');
      const distances = data.map(p => p.distance);

      const minElevation = Math.min(...elevations);
      const maxElevation = Math.max(...elevations);
      const elevationRange = maxElevation - minElevation;
      const totalDistance = distances[distances.length - 1] || 1;

      const scaleFactor = 10000; // tweak if needed
      const baseHeight = 80;
      
      const canvas = document.getElementById('elevationChart');      
      const dynamicHeight = baseHeight + (elevationRange / totalDistance) * scaleFactor;
      canvas.height = Math.min(Math.max(dynamicHeight, baseHeight), 200);

      const ctx = canvas.getContext('2d');

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map((_, i) => i),
          datasets: [{
            data: elevations,
            segment: {
              borderColor: ctx => segmentColors[ctx.p1DataIndex] || 'gray'
            },
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 3,
            fill: false,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          layout: {
            padding: { left: 20, right: 20 }
          },
          clip: false,
          elements: {
            point: { pointStyle: 'circle' }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `Høyde: ${ctx.parsed.y.toFixed(1)} m`
              }
            },
            annotation: {
              annotations: data.map((point, i) => {
                if (!point.label) return null;
                return {
                  type: 'label',
                  xValue: i,
                  yValue: point.elevation,
                  content: point.label,
                  backgroundColor: 'rgba(255,255,255,0.7)',
                  font: {
                    size: 11,
                    weight: 'bold'
                  },
                  color: '#000',
                  xAdjust: point.label === 'Kiwi' ? 10 : -20,
                  yAdjust: -10,
                  position: {
                    x: 'center',
                    y: 'center'
                  },
                  callout: {
                    display: true,
                    side: point.label === 'Kiwi' ? 'right' : 'left'
                  }
                };
              }).filter(Boolean)
            }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
    }

    loadTraffic();
    loadPathData();
  </script>

  <a href="https://www.buymeacoffee.com/hpeide" target="_blank" rel="noopener" class="coffee-button">
    <img
      src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=hpeide&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff"
      alt="Buy me a coffee" />
  </a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Status</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    .status { font-size: 2em; margin-top: 20px; }
    .time, .updated { font-size: 1.2em; margin-top: 10px; }
    .note { margin-top: 30px; font-size: 0.9em; color: gray; }
  </style>
</head>
<body>

  <h1>Traffic Status</h1>
  <div class="status">Loading...</div>
  <div class="time"></div>
  <div class="updated"></div>
  <div class="note">Updated every 5 minutes between 06:30 and 10:00 (Oslo time).</div>

  <script>
    async function loadTraffic() {
      const res = await fetch('/traffic.json');
      if (!res.ok) {
        document.querySelector('.status').textContent = "❌ Could not load data.";
        return;
      }

      const data = await res.json();
      const statusEl = document.querySelector('.status');
      const timeEl = document.querySelector('.time');
      const updatedEl = document.querySelector('.updated');

      if (data.durationMinutes > data.staticMinutes + 2) {
        statusEl.textContent = "🚨 Traffic congestion on the route!";
      } else {
        statusEl.textContent = "✅ No significant congestion.";
      }

      timeEl.textContent = `Estimated time: ${data.durationMinutes} min (normal: ${data.staticMinutes} min)`;
      updatedEl.textContent = `Last updated: ${data.updated}`;
    }

    loadTraffic();
  </script>

</body>
</html>
